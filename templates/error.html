<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Error — Low Light Enhancer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Inter',sans-serif; background:#0f0f14; color:#e2e2e8;
           display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
    .card { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
            border-radius:14px; padding:2rem 2.5rem; max-width:500px; text-align:center; }
    h2 { color:#fca5a5; margin-bottom:0.75rem; }
    p  { color:#d1d5db; font-size:0.9rem; margin-bottom:1.25rem; }
    code { background:rgba(255,255,255,0.07); padding:0.2rem 0.4rem; border-radius:4px; font-size:0.85rem; color:#fbbf24; }
    a { color:#a78bfa; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>⚠ Processing Error</h2>
    <p>Something went wrong while processing your image:</p>
    <p><code>{{ error }}</code></p>
    <a href="javascript:history.back()">← Go back</a>
  </div>
</body>
</html>
