<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Histogram — Low Light Enhancer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'Inter',sans-serif; background:#0f0f14; color:#e2e2e8; min-height:100vh; }
    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:1rem 2rem; background:rgba(255,255,255,0.04);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }
    .nav-brand { font-size:1.1rem; font-weight:700; color:#a78bfa; }
    .nav-links a { color:#9ca3af; text-decoration:none; margin-left:1.5rem; font-size:0.9rem; }
    main { padding:2rem; max-width:900px; margin:0 auto; }
    h2 { margin-bottom:1.5rem; font-size:1.4rem; }
    .histo-grid { display:flex; gap:1rem; flex-wrap:wrap; }
    .histo-grid img {
      flex:1; min-width:200px; max-width:100%;
      border-radius:10px; border:1px solid rgba(255,255,255,0.08);
    }
    .back-btn {
      display:inline-block; margin-top:1.5rem; padding:0.55rem 1.1rem;
      border:1px solid rgba(255,255,255,0.1); border-radius:8px;
      color:#d1d5db; text-decoration:none; font-size:0.88rem;
      background:rgba(255,255,255,0.05); transition:background 0.15s;
    }
    .back-btn:hover { background:rgba(255,255,255,0.1); }
  </style>
</head>
<body>
<nav>
  <span class="nav-brand">✦ LowLight Enhancer</span>
  <div class="nav-links"><a href="/">Home</a><a href="/about">About</a></div>
</nav>
<main>
  <h2>📊 RGB Histogram</h2>
  <div class="histo-grid">
    {% for fp in file_paths %}
      <img src="{{ url_for('static', filename=fp) }}" alt="Histogram"/>
    {% endfor %}
  </div>
  <a class="back-btn" href="javascript:history.back()">← Back to Editor</a>
</main>
</body>
</html>
